<!-- Tab 5: 饮食页 -->
<div class="tab-panel" id="food-tab">
    <!-- 今日热量摄入卡片 -->
    <div class="calorie-summary-card">
        <div class="calorie-header">
            <h2>今日热量摄入</h2>
            <div class="date-display" id="foodDate"></div>
        </div>
        <div class="calorie-display">
            <div class="calorie-main">
                <div class="calorie-value" id="totalCalories">0</div>
                <div class="calorie-unit">kcal</div>
            </div>
            <div class="calorie-target">
                <span>目标: </span>
                <span id="calorieTarget">2000</span>
                <span> kcal</span>
            </div>
        </div>
        <div class="calorie-progress-bar">
            <div class="calorie-progress-fill" id="calorieProgressFill" style="width: 0%"></div>
        </div>
    </div>

    <!-- 拍照识别区域 -->
    <div class="food-camera-card">
        <h3>🍽️ 拍照识别食物</h3>
        <div class="camera-area">
            <input type="file" id="foodPhotoInput" accept="image/*" capture="camera" style="display: none;">
            <button class="btn-camera" id="takeFoodPhoto">
                <span class="camera-icon">📷</span>
                <span>拍照识别</span>
            </button>
            <div class="camera-preview" id="foodPhotoPreview" style="display: none;">
                <img id="foodPhotoImg" src="" alt="食物照片">
                <button class="photo-remove-btn" id="removeFoodPhoto">×</button>
            </div>
        </div>
        
        <!-- 识别结果 -->
        <div class="recognition-result" id="recognitionResult" style="display: none;">
            <div class="result-loading" id="resultLoading">
                <div class="loading-spinner"></div>
                <p>识别中...</p>
            </div>
            <div class="result-content" id="resultContent" style="display: none;">
                <div class="food-info">
                    <h4 id="foodName">--</h4>
                    <div class="food-confidence">
                        <span>置信度: </span>
                        <span id="foodConfidence">--</span>
                    </div>
                </div>
                <div class="nutrition-info">
                    <div class="nutrition-item">
                        <span class="nutrition-label">热量</span>
                        <span class="nutrition-value" id="foodCalorie">--</span>
                        <span class="nutrition-unit">kcal/100g</span>
                    </div>
                </div>
                <div class="alternative-foods" id="alternativeFoods" style="display: none;">
                    <p class="alternative-title">其他可能：</p>
                    <div class="alternative-list" id="alternativeList"></div>
                </div>
                <div class="result-actions">
                    <button class="btn-primary" id="confirmFood">确认添加</button>
                    <button class="btn-secondary" id="retryRecognition">重新识别</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 手动添加食物 -->
    <div class="manual-food-card">
        <h3>✏️ 手动添加</h3>
        <div class="manual-input-group">
            <input type="text" id="manualFoodName" placeholder="食物名称">
            <input type="number" id="manualFoodCalorie" placeholder="热量(kcal)" step="1" min="0">
            <button class="btn-add" id="addManualFood">添加</button>
        </div>
    </div>

    <!-- 今日饮食记录列表 -->
    <div class="food-records-card">
        <h3>📋 今日饮食记录</h3>
        <div class="food-records-list" id="foodRecordsList">
            <div class="empty-records">
                <p>今天还没有饮食记录</p>
                <p class="empty-hint">拍照或手动添加食物开始记录</p>
            </div>
        </div>
    </div>

    <!-- 营养分析 -->
    <div class="nutrition-analysis-card">
        <h3>📊 营养分析</h3>
        <div class="nutrition-chart">
            <canvas id="nutritionChart"></canvas>
        </div>
        <div class="nutrition-summary" id="nutritionSummary">
            <div class="nutrition-stat">
                <span class="stat-label">蛋白质</span>
                <span class="stat-value" id="proteinValue">0g</span>
            </div>
            <div class="nutrition-stat">
                <span class="stat-label">脂肪</span>
                <span class="stat-value" id="fatValue">0g</span>
            </div>
            <div class="nutrition-stat">
                <span class="stat-label">碳水</span>
                <span class="stat-value" id="carbsValue">0g</span>
            </div>
        </div>
    </div>
</div>
