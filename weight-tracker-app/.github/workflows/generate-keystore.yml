name: Generate Keystore (One-time Setup)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Generate keystore
      run: |
        keytool -genkey -v -keystore my-release-key.keystore \
          -alias my-key-alias \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass android \
          -keypass android \
          -dname "CN=Weight Tracker,O=Weight Tracker,C=CN"
        
        echo ""
        echo "=========================================="
        echo "COPY THE FOLLOWING BASE64 STRING:"
        echo "=========================================="
        base64 -w 0 my-release-key.keystore
        echo ""
        echo "=========================================="
        echo ""
        echo "Add this to GitHub Secrets:"
        echo "Name: KEYSTORE_BASE64"
        echo "Value: (paste the base64 string above)"
        echo "=========================================="
