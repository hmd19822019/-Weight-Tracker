name: Generate Keystore File

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Generate keystore
      run: |
        keytool -genkey -v -keystore my-release-key.keystore \
          -alias my-key-alias \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass android \
          -keypass android \
          -dname "CN=Weight Tracker,O=Weight Tracker,C=CN"
        
        # 转换为base64并保存到文件
        base64 -w 0 my-release-key.keystore > keystore-base64.txt
        
        echo "密钥已生成并转换为base64"
        
    - name: Upload keystore base64
      uses: actions/upload-artifact@v3
      with:
        name: keystore-base64
        path: keystore-base64.txt
