name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Install Cordova
      run: npm install -g cordova
      
    - name: Install dependencies
      run: |
        if [ -f package.json ]; then
          npm install
        fi
        
    - name: Add Android platform
      run: cordova platform add android
      
    - name: Setup signing key
      run: |
        # 如果GitHub Secrets中有密钥，使用它；否则生成新的
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "Using keystore from secrets"
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > weight-tracker.keystore
        else
          echo "Generating new keystore (first time setup)"
          keytool -genkey -v -keystore weight-tracker.keystore \
            -alias weight-tracker \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "WeightTracker2024" \
            -keypass "WeightTracker2024" \
            -dname "CN=Weight Tracker, OU=Development, O=Weight Tracker App, L=Shanghai, ST=Shanghai, C=CN"
          
          # 输出base64编码的密钥，用于添加到GitHub Secrets
          echo "=========================================="
          echo "IMPORTANT: Add this to GitHub Secrets as KEYSTORE_BASE64:"
          echo "=========================================="
          base64 -w 0 weight-tracker.keystore
          echo ""
          echo "=========================================="
        fi
      
    - name: Create build.json
      run: |
        cat > build.json << EOF
        {
          "android": {
            "release": {
              "keystore": "weight-tracker.keystore",
              "storePassword": "${{ secrets.KEYSTORE_PASSWORD || 'WeightTracker2024' }}",
              "alias": "weight-tracker",
              "password": "${{ secrets.KEY_PASSWORD || 'WeightTracker2024' }}",
              "keystoreType": ""
            }
          }
        }
        EOF
        
    - name: Build Android Release APK
      run: cordova build android --release
      
    - name: Rename APK
      run: |
        cd platforms/android/app/build/outputs/apk/release
        mv app-release.apk weight-tracker-v2.0.${{ github.run_number }}.apk
        
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: weight-tracker-release-apk
        path: platforms/android/app/build/outputs/apk/release/weight-tracker-v2.0.${{ github.run_number }}.apk
        
    - name: Create Release
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v2.0.${{ github.run_number }}
        name: 智能体重管理 v2.0.${{ github.run_number }}
        body: |
          ## 🎉 智能体重管理 v2.0.${{ github.run_number }}
          
          ### ✨ 最新更新
          - ✅ 修复趋势预测计算错误
          - ✅ 支持记录历史日期的体重
          - ✅ 日期和时间选择器
          - ✅ 智能重复检测和覆盖提示
          - ✅ 编辑记录时可修改日期时间
          - ✅ 数据导入保留原始日期
          - ✅ 自动跳过重复记录
          
          ### 🎨 核心功能
          - 📝 体重和体脂率记录
          - 📸 照片记录和对比
          - 💧 水分摄入追踪
          - 🔥 连续记录天数
          - 🏆 成就系统(12个成就)
          - 💡 智能健康建议
          - 📊 BMI可视化分析
          - 🔮 趋势预测（已修复）
          - 📋 周报/月报生成
          - 🌓 深色模式支持
          
          ### 📥 安装说明
          1. 下载下方的 APK 文件
          2. 传输到 Android 手机
          3. 允许"安装未知来源应用"
          4. 安装并开始使用
          
          ### 🔐 签名信息
          - 此版本使用固定签名密钥
          - 可以直接覆盖安装旧版本
          - 无需卸载重装
          
          ---
          
          **注意**: 如果之前安装的是不同签名的版本，需要先卸载再安装。
        files: platforms/android/app/build/outputs/apk/release/weight-tracker-v2.0.${{ github.run_number }}.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
