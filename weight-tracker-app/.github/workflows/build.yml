name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Install Cordova
      run: npm install -g cordova
      
    - name: Install dependencies
      run: |
        if [ -f package.json ]; then
          npm install
        fi
        
    - name: Add Android platform
      run: cordova platform add android
      
    - name: Install Cordova plugins
      run: |
        cordova plugin add cordova-plugin-file
      
    - name: Create keystore from base64
      run: |
        # 使用固定的base64密钥（如果存在）
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "Using keystore from GitHub Secrets"
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my-release-key.keystore
        else
          echo "No keystore in secrets, generating a new one"
          echo ""
          echo "=========================================="
          echo "⚠️  IMPORTANT: FIRST TIME SETUP"
          echo "=========================================="
          keytool -genkey -v -keystore my-release-key.keystore \
            -alias my-key-alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Weight Tracker,O=Weight Tracker,C=CN"
          
          echo ""
          echo "=========================================="
          echo "📋 COPY THIS BASE64 STRING:"
          echo "=========================================="
          base64 -w 0 my-release-key.keystore
          echo ""
          echo "=========================================="
          echo ""
          echo "🔧 Add to GitHub Secrets:"
          echo "   Name: KEYSTORE_BASE64"
          echo "   Value: (the base64 string above)"
          echo "   URL: https://github.com/hmd19822019/-Weight-Tracker/settings/secrets/actions"
          echo "=========================================="
        fi
      
    - name: Create build.json
      run: |
        cat > build.json << 'EOF'
        {
          "android": {
            "release": {
              "keystore": "my-release-key.keystore",
              "storePassword": "android",
              "alias": "my-key-alias",
              "password": "android"
            }
          }
        }
        EOF
        
    - name: Build Android Release APK
      run: cordova build android --release
      
    - name: Rename APK
      run: |
        cd platforms/android/app/build/outputs/apk/release
        mv app-release.apk weight-tracker-v2.0.${{ github.run_number }}.apk
        
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: weight-tracker-release-apk
        path: platforms/android/app/build/outputs/apk/release/weight-tracker-v2.0.${{ github.run_number }}.apk
        
    - name: Create Release
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v2.0.${{ github.run_number }}
        name: 智能体重管理 v2.0.${{ github.run_number }}
        body: |
          ## 🎉 智能体重管理 v2.0.${{ github.run_number }}
          
          ### ⚠️ 重要提示
          **首次安装此版本需要卸载旧版本！**
          之后的更新可以直接覆盖安装。
          
          ### ✨ 最新更新
          - ✅ 修复目标进度预计完成时间计算
          - ✅ 修复趋势预测计算错误
          - ✅ 支持记录历史日期的体重
          - ✅ 使用固定签名，后续可覆盖安装
          
          ### 🎨 核心功能
          - 📝 体重和体脂率记录
          - 📸 照片记录和对比
          - 💧 水分摄入追踪
          - 🔥 连续记录天数
          - 🏆 成就系统(12个成就)
          - 💡 智能健康建议
          - 📊 BMI可视化分析
          - 🔮 趋势预测
          - 📋 周报/月报生成
          - 🌓 深色模式支持
          
          ### 📥 安装说明
          1. **卸载旧版本**（如果已安装）
          2. 下载下方的 APK 文件
          3. 传输到 Android 手机
          4. 允许"安装未知来源应用"
          5. 安装并开始使用
          
          ### 🔐 签名说明
          - 从此版本开始使用固定签名
          - 后续版本可以直接覆盖安装
          - 无需再次卸载
        files: platforms/android/app/build/outputs/apk/release/weight-tracker-v2.0.${{ github.run_number }}.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
